# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

name: test-coverage

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
          covr::report(cov, file = "coverage.html", browse = FALSE)
        shell: Rscript {0}

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            cobertura.xml
            coverage.html

      - uses: codecov/codecov-action@v5
        # Codecov uploads from `push` events require a valid CODECOV_TOKEN secret.
        # Without it, codecov-action exits non-zero and fails the workflow.
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml
          disable_search: true
          fail_ci_if_error: ${{ github.event_name != 'pull_request' }}

      - name: Codecov skipped (missing CODECOV_TOKEN)
        if: ${{ secrets.CODECOV_TOKEN == '' }}
        run: |
          echo "Skipping Codecov upload because secrets.CODECOV_TOKEN is not set."
          echo "Set CODECOV_TOKEN in repo settings (Actions secrets) to enable coverage uploads."
        shell: bash

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
