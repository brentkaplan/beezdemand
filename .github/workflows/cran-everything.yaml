# Heavyweight preflight for CRAN releases: matrix check + optional PDF manual + gated pkgdown build.
name: cran-everything

on:
  workflow_dispatch:
    inputs:
      build_manual:
        description: Build the PDF manual (TinyTeX + R CMD build --manual). Slower.
        type: boolean
        required: false
        default: false

permissions: read-all

jobs:
  cran-check:
    name: ${{ matrix.os }} (R release)
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - name: Build + check (CRAN)
        uses: ./.github/actions/cran-everything
        with:
          mode: check
          r-version: release
          build-manual: ${{ inputs.build_manual }}
          run-lint: ${{ matrix.os == 'ubuntu-latest' }}
          run-urlcheck: ${{ matrix.os == 'ubuntu-latest' }}
          check-args: --as-cran

      - name: Upload check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cran-check-${{ matrix.os }}
          path: |
            *.tar.gz
            *.Rcheck/**
            session-info.txt

  pkgdown:
    name: pkgdown (ubuntu)
    runs-on: ubuntu-latest
    needs: cran-check
    if: ${{ needs.cran-check.result == 'success' }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Build pkgdown site
        uses: ./.github/actions/cran-everything
        with:
          mode: pkgdown
          r-version: release
          pkgdown-dest: docs

      - name: Upload pkgdown site
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkgdown-site
          path: docs/**
